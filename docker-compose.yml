services:
  app:
    image: ghcr.io/dyedd/lens:latest
    container_name: lens
    env_file:
      - path: .env
        required: false
    environment:
      - LENS_HOST=0.0.0.0
      - LENS_PORT=3000
      - LENS_DATABASE_URL=${LENS_DATABASE_URL:-sqlite+aiosqlite:////app/data/data.db}
      - LENS_UI_STATIC_DIR=/app/ui
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/healthz', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
