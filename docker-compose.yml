services:
  app:
    image: ghcr.io/dyedd/lens:latest
    container_name: lens
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - LENS_HOST=0.0.0.0
      - LENS_PORT=3000
      - LENS_UI_STATIC_DIR=/app/ui
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
